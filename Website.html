    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-divider {
            width: 1px;
            height: 2rem;
            background: #334155;
            flex-shrink: 0;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Filter Section */
        .filters {
            background: #1e293b;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-label {
            color: #94a3b8;
            font-weight: 600;
            margin-right: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-btn {
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            padding: 0.4rem 0.6rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #475569;
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }

        .filter-btn.clear {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            margin-left: auto;
        }

        .filter-btn.clear:hover {
            background: #ef4444;
            color: white;
        }

        /* Stats Counter */
        .stats {
            display: flex;
            gap: 2rem;
            margin-left: 2rem;
            padding-left: 2rem;
            border-left: 1px solid #334155;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
        }

        /* Map Container */
        #map {
            height: calc(100vh - 140px);
            width: 100vw;
            background: #0f172a;
            z-index: 1;
        }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .leaflet-popup-content {
            margin: 0;
            width: 300px !important;
        }

        .leaflet-popup-tip {
            background: #1e293b;
        }

        .popup-header {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        .popup-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 0.25rem;
        }

        .popup-institution {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .popup-body {
            padding: 1rem;
        }

        .popup-description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .popup-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            background: #0f172a;
            color: #38bdf8;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            border: 1px solid #334155;
        }

        .popup-link {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }

        .popup-link:hover {
            background: #0ea5e9;
            transform: translateY(-1px);
        }

        /* Avatar (photo or initials fallback) */
        .avatar {
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid #475569;
            text-transform: uppercase;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar--sm { width: 48px; height: 48px; font-size: 1rem; }
        .avatar--lg { width: 88px; height: 88px; font-size: 1.75rem; }

        .popup-header-row,
        .modal-header-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .popup-topic {
            font-size: 0.85rem;
            color: #94a3b8;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }

        .modal-topic {
            color: #cbd5e1;
            font-size: 1rem;
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        /* Contact + link lists in modal */
        .contact-list,
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .contact-list li,
        .link-list li {
            color: #cbd5e1;
            line-height: 1.7;
        }

        .contact-list a,
        .link-list a {
            color: #38bdf8;
            text-decoration: none;
        }

        .contact-list a:hover,
        .link-list a:hover {
            text-decoration: underline;
        }

        /* Custom Marker Styles - Gemini-style 4-point sparkle */
        .custom-marker {
            width: 26px;
            height: 26px;
            filter: drop-shadow(0 0 4px rgba(56, 189, 248, 0.6));
        }

        .custom-marker svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
            transition: transform 0.3s;
            transform-origin: center;
        }

        .custom-marker:hover {
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.95));
        }

        .custom-marker:hover svg {
            transform: scale(1.35) rotate(0deg);
        }

        .custom-marker.filtered-out {
            opacity: 0.2;
            filter: none;
        }

        /* Lab List Sidebar (Mobile Alternative) */
        .lab-list {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .lab-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .lab-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: #38bdf8;
        }

        .lab-card.hidden {
            display: none;
        }

        .lab-card h3 {
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }

        .lab-card .location {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* Modal for Detailed View */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #334155;
            position: relative;
        }

        .modal-header {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            padding: 2rem;
            border-bottom: 1px solid #334155;
        }

        .modal-title {
            font-size: 1.75rem;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-section {
            margin-bottom: 1.5rem;
        }

        .modal-section h4 {
            color: #38bdf8;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-section p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #334155;
            border: none;
            color: #e2e8f0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: #ef4444;
            transform: rotate(90deg);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .header-content { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .header-divider { display: none; }
            .stats { display: none; }
            #map { height: 50vh; }
            .lab-list { display: block; }
            .filter-container { gap: 0.25rem; }
            .filter-btn { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
        }
    </style>
</head>

        // --- Proximity grouping for overlap prevention ---
        const MIN_PIXEL_GAP = 5; // minimum pixel distance between marker centers (half icon width — stars overlap but tips remain visible)
        const CLUSTER_KM = 10;   // geographic threshold to pre-group co-located markers

        function haversineKm(c1, c2) {
            const R = 6371;
            const dLat = (c2[0] - c1[0]) * Math.PI / 180;
            const dLon = (c2[1] - c1[1]) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(c1[0] * Math.PI / 180) * Math.cos(c2[0] * Math.PI / 180)
                * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function buildGroups() {
            const assigned = new Set();
            const groups = [];
            researchers.forEach(r => {
                if (assigned.has(r.id)) return;
                const group = [r];
                assigned.add(r.id);
                researchers.forEach(other => {
                    if (!assigned.has(other.id) && haversineKm(r.coords, other.coords) < CLUSTER_KM) {
                        group.push(other);
                        assigned.add(other.id);
                    }
                });
                groups.push(group);
            });
            return groups;
        }

        const WORLD_BOUNDS = L.latLngBounds([SOUTH_LAT, -180], [NORTH_LAT, 180]);

        // Web Mercator y position of a latitude, normalized to [0, 1] over the
        // full ±85.05° world. Used to size the cropped bounds in tile pixels.
        function latToYFrac(lat) {
            const s = Math.sin(lat * Math.PI / 180);
            return 0.5 - Math.log((1 + s) / (1 - s)) / (4 * Math.PI);
        }
        const BOUNDS_HEIGHT_FRAC = latToYFrac(SOUTH_LAT) - latToYFrac(NORTH_LAT);

        // Compute the minimum zoom that makes the bounded region fill BOTH width
        // and height of the map container. World width at zoom z is 256 * 2^z;
        // bounded height is BOUNDS_HEIGHT_FRAC * 256 * 2^z.
        function getMinZoom() {
            const mapEl = document.getElementById('map');
            const tileSize = 256;
            return Math.max(
                Math.log2(mapEl.clientWidth / tileSize),
                Math.log2(mapEl.clientHeight / (tileSize * BOUNDS_HEIGHT_FRAC))
            );
        }

        const initialMinZoom = getMinZoom();

        // Initialize map: centered on the world, locked inside world bounds
        // (maxBoundsViscosity: 1.0 makes the edges hard, like Google Maps)
        const map = L.map('map', {
            center: [20, 0],
            zoom: initialMinZoom,
            minZoom: initialMinZoom,
            maxZoom: 10,
            maxBounds: WORLD_BOUNDS,
            maxBoundsViscosity: 1.0,
            worldCopyJump: false,
            scrollWheelZoom: true,
            zoomSnap: 0.25,
            zoomDelta: 0.5,
            attributionControl: false
        });

        // Dark theme map tiles - no wrapping
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
            noWrap: true,
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        // Re-lock the minimum zoom on resize so the world keeps filling the viewport
        window.addEventListener('resize', () => {
            const newMinZoom = getMinZoom();
            map.setMinZoom(newMinZoom);
            if (map.getZoom() < newMinZoom) {
                map.setZoom(newMinZoom);
            }
        });

        // Spread co-located markers so none is hidden behind another.
        // At low zoom: markers in the same geographic cluster are placed on a small
        // pixel-space circle so they remain individually visible.
        // At high zoom: real geographic separation is large enough in pixels, so
        // markers snap back to their exact coordinates.
        function repositionMarkers() {
            proximityGroups.forEach(group => {
                if (group.length === 1) {
                    markers[group[0].id].setLatLng(group[0].coords);
                    return;
                }
                const N = group.length;
                const pts = group.map(r => map.latLngToContainerPoint(L.latLng(r.coords)));

                // Find the smallest pairwise pixel distance within this group
                let minDist = Infinity;
                for (let i = 0; i < N; i++) {
                    for (let j = i + 1; j < N; j++) {
                        const d = pts[i].distanceTo(pts[j]);
                        if (d < minDist) minDist = d;
                    }
                }

                if (minDist >= MIN_PIXEL_GAP) {
                    // Already well-separated at this zoom — use exact coordinates
                    group.forEach(r => markers[r.id].setLatLng(r.coords));
                } else {
                    // Spread onto a circle in pixel space so adjacent markers are
                    // exactly MIN_PIXEL_GAP pixels apart
                    const cx = pts.reduce((s, p) => s + p.x, 0) / N;
                    const cy = pts.reduce((s, p) => s + p.y, 0) / N;
                    const radius = N === 1 ? 0 : MIN_PIXEL_GAP / (2 * Math.sin(Math.PI / N));
                    group.forEach((r, i) => {
                        const angle = (2 * Math.PI * i / N) - Math.PI / 2;
                        const offsetPt = L.point(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
                        markers[r.id].setLatLng(map.containerPointToLatLng(offsetPt));
                    });
                }
            });
        }

        map.on('zoomend', repositionMarkers);

        // Store markers for filtering
        const markers = {};
        let activeFilter = 'all';

        // Gemini-style 4-point sparkle marker (concave-sided star)
        const SPARKLE_SVG = `
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0 C12 8, 16 12, 24 12 C16 12, 12 16, 12 24 C12 16, 8 12, 0 12 C8 12, 12 8, 12 0 Z"
                      fill="#38bdf8" stroke="white" stroke-width="0.8" stroke-linejoin="round"/>
            </svg>
        `;

        function createCustomIcon() {
            return L.divIcon({
                className: 'custom-marker',
                html: SPARKLE_SVG,
                iconSize: [26, 26],
                iconAnchor: [13, 13],
                popupAnchor: [0, -13]
            });
        }

        function getInitials(name) {
            return name
                .split(/\s+/)
                .filter(Boolean)
                .map(part => part[0])
                .slice(0, 2)
                .join('');
        }

        function escapeAttr(str) {
            return String(str).replace(/"/g, '&quot;');
        }

        // Renders an <img> if a photo URL is set, else a colored circle with initials.
        function renderAvatar(researcher, sizeClass) {
            if (researcher.photo) {
                return `<div class="avatar ${sizeClass}"><img src="${escapeAttr(researcher.photo)}" alt="${escapeAttr(researcher.name)}"></div>`;
            }
            return `<div class="avatar ${sizeClass}">${getInitials(researcher.name)}</div>`;
        }

        function renderTags(focus) {
            return focus.map(tag => `<span class="tag">${tag}</span>`).join('');
        }

        // Initialize markers
        function initMarkers() {
            researchers.forEach(researcher => {
                const marker = L.marker(researcher.coords, {
                    icon: createCustomIcon()
                }).addTo(map);

                const popupContent = `
                    <div class="popup-header">
                        <div class="popup-header-row">
                            ${renderAvatar(researcher, 'avatar--sm')}
                            <div>
                                <div class="popup-title">${researcher.name}</div>
                                <div class="popup-institution">${researcher.institution}</div>
                            </div>
                        </div>
                    </div>
                    <div class="popup-body">
                        <div class="popup-topic">${researcher.topic}</div>
                        <div class="popup-tags">${renderTags(researcher.focus)}</div>
                        <a href="#" class="popup-link" onclick="openModal(${researcher.id}); return false;">View Full Details</a>
                    </div>
                `;

                marker.bindPopup(popupContent);
                markers[researcher.id] = marker;
            });
        }

        // Initialize the mobile-fallback list
        function initResearcherList() {
            const listContainer = document.getElementById('labList');
            researchers.forEach(researcher => {
                const card = document.createElement('div');
                card.className = 'lab-card';
                card.dataset.id = researcher.id;
                card.dataset.focus = researcher.focus.join(' ');
                card.innerHTML = `
                    <div class="popup-header-row" style="margin-bottom: 0.75rem;">
                        ${renderAvatar(researcher, 'avatar--sm')}
                        <div>
                            <h3>${researcher.name}</h3>
                            <div class="location">📍 ${researcher.location} • ${researcher.institution}</div>
                        </div>
                    </div>
                    <div class="popup-tags">${renderTags(researcher.focus)}</div>
                    <p style="margin-top: 0.5rem; color: #94a3b8; font-size: 0.9rem;">${researcher.topic}</p>
                `;
                card.onclick = () => openModal(researcher.id);
                listContainer.appendChild(card);
            });
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Update active button
                document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const filter = e.target.dataset.filter;
                activeFilter = filter;
                applyFilter(filter);
            });
        });

        function applyFilter(filter) {
            researchers.forEach(researcher => {
                const marker = markers[researcher.id];
                const card = document.querySelector(`.lab-card[data-id="${researcher.id}"]`);
                const matches = filter === 'all' || researcher.focus.includes(filter);

                if (matches) {
                    marker.setOpacity(1);
                    marker._icon.classList.remove('filtered-out');
                    if (card) card.classList.remove('hidden');
                } else {
                    marker.setOpacity(0.2);
                    marker._icon.classList.add('filtered-out');
                    if (card) card.classList.add('hidden');
                }
            });
        }

        function resetFilters() {
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');
            applyFilter('all');
        }

        // Modal functionality
        function openModal(researcherId) {
            const researcher = researchers.find(r => r.id === researcherId);
            if (!researcher) return;

            const contactItems = [];
            if (researcher.email) {
                contactItems.push(`<li>📧 <a href="mailto:${escapeAttr(researcher.email)}">${researcher.email}</a></li>`);
            }
            if (researcher.phone) {
                contactItems.push(`<li>📞 <a href="tel:${escapeAttr(researcher.phone.replace(/\s+/g, ''))}">${researcher.phone}</a></li>`);
            }
            const contactSection = contactItems.length ? `
                <div class="modal-section">
                    <h4>Contact</h4>
                    <ul class="contact-list">${contactItems.join('')}</ul>
                </div>
            ` : '';

            const linkItems = [];
            if (researcher.labWebsite) {
                linkItems.push(`<li><a href="${escapeAttr(researcher.labWebsite)}" target="_blank" rel="noopener">🌐 Lab homepage</a></li>`);
            }
            if (researcher.scholar) {
                linkItems.push(`<li><a href="${escapeAttr(researcher.scholar)}" target="_blank" rel="noopener">🎓 Google Scholar</a></li>`);
            }
            (researcher.extraLinks || []).forEach(link => {
                linkItems.push(`<li><a href="${escapeAttr(link.url)}" target="_blank" rel="noopener">🔗 ${link.label}</a></li>`);
            });
            const linksSection = linkItems.length ? `
                <div class="modal-section">
                    <h4>Links</h4>
                    <ul class="link-list">${linkItems.join('')}</ul>
                </div>
            ` : '';

            const appearancesSection = (researcher.appearances && researcher.appearances.length) ? `
                <div class="modal-section">
                    <h4>Talks & Appearances</h4>
                    <ul class="link-list">
                        ${researcher.appearances.map(a => `
                            <li><a href="${escapeAttr(a.url)}" target="_blank" rel="noopener">▶️ ${a.label}</a></li>
                        `).join('')}
                    </ul>
                </div>
            ` : '';

            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="modal-header">
                    <div class="modal-header-row">
                        ${renderAvatar(researcher, 'avatar--lg')}
                        <div>
                            <div class="modal-title">${researcher.name}</div>
                            <div class="modal-subtitle">${researcher.institution} • ${researcher.location}</div>
                            <div class="modal-topic">${researcher.topic}</div>
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="modal-section">
                        <h4>Research Focus</h4>
                        <div class="popup-tags" style="margin-top: 0.5rem;">${renderTags(researcher.focus)}</div>
                    </div>

                    <div class="modal-section">
                        <h4>About</h4>
                        <p>${researcher.description}</p>
                    </div>

                    <div class="modal-section">
                        <h4>Key Achievement</h4>
                        <p style="color: #38bdf8;">${researcher.notable}</p>
                    </div>

                    ${contactSection}
                    ${linksSection}
                    ${appearancesSection}
                </div>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize everything
        initMarkers();
        repositionMarkers();
        initResearcherList();
    </script>
</body>
</html>
